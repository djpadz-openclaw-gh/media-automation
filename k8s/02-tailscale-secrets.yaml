---
# Tailscale state storage — one per CronJob to avoid identity conflicts.
# Tailscale will populate these automatically on first connect.
apiVersion: v1
kind: Secret
metadata:
  name: tailscale-state-sonarr
  namespace: media-automation
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: tailscale-state-radarr
  namespace: media-automation
type: Opaque
---
# Tailscale auth key — replace YOUR_TAILSCALE_AUTH_KEY with an actual key.
# Generate at: https://login.tailscale.com/admin/settings/keys
# Recommended settings: ephemeral + reusable + pre-approved
apiVersion: v1
kind: Secret
metadata:
  name: tailscale-auth
  namespace: media-automation
type: Opaque
stringData:
  TS_AUTHKEY: "YOUR_TAILSCALE_AUTH_KEY"
