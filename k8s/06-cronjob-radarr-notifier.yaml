---
# CronJob: radarr-notifier
# Polls Radarr every 15 minutes for new movie imports and sends Telegram alerts.
# Uses Tailscale sidecar (native sidecar, requires Kubernetes 1.28+) for MagicDNS.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: radarr-notifier
  namespace: media-automation
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: radarr-notifier
              image: registry.container-registry.svc.cluster.local:32000/media-automation:latest
              imagePullPolicy: Always
              args: ["notify_radarr.py"]
              env:
                - name: RADARR_URL
                  value: "http://dindjarin.tail1916d.ts.net:7878"
                - name: OP_SERVICE_ACCOUNT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: op-service-account
                      key: OP_SERVICE_ACCOUNT_TOKEN
              volumeMounts:
                - name: state
                  mountPath: /app/state
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: media-automation-state
