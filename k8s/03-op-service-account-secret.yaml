---
# 1Password service account token for the notifier scripts.
# Replace YOUR_OP_SERVICE_ACCOUNT_TOKEN with the actual token.
apiVersion: v1
kind: Secret
metadata:
  name: op-service-account
  namespace: media-automation
type: Opaque
stringData:
  OP_SERVICE_ACCOUNT_TOKEN: "YOUR_OP_SERVICE_ACCOUNT_TOKEN"
